<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PI Ecosystem Store | Plugin & Theme WordPress</title>
    <meta
      name="description"
      content="Storefront chính thức của PI Ecosystem: bán plugin và theme WordPress hiệu năng cao, hỗ trợ triển khai thực chiến."
    />
    <meta property="og:title" content="PI Ecosystem Store" />
    <meta
      property="og:description"
      content="Khám phá plugin và theme WordPress của PI Ecosystem với giao diện chuyên nghiệp, hỗ trợ tư vấn triển khai."
    />
    <meta property="og:image" content="/og-default.webp" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="vi_VN" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Lexend:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="/logo-optimized.svg?v=20260417-2" />
    <link rel="shortcut icon" href="/logo-optimized.svg?v=20260417-2" />
    <script>
      (function() {
        try {
          var store = JSON.parse(localStorage.getItem('pi-ui'));
          var theme = (store && store.state && store.state.theme) || 'dark';
          document.documentElement.dataset.theme = theme;
          document.documentElement.classList.add('no-transitions');
        } catch (e) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
    <style>
      /* Prevent white flash before index.css loads */
      html { background-color: #090b0f; } /* Default to dark background */
      html[data-theme="light"] { background-color: #f8fafc; }
      
      /* Avoid layout shifts for the root container */
      #root { min-height: 100vh; display: flex; flex-direction: column; }
      
      /* Utility to disable transitions during boot */
      .no-transitions *, .no-transitions {
        -webkit-transition: none !important;
        -moz-transition: none !important;
        -ms-transition: none !important;
        -o-transition: none !important;
        transition: none !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <div id="modal-root"></div>
    <div id="drawer-root"></div>
  </body>
</html>
